name = "jamestannahill-com"
# Custom domains (jamestannahill.com, www) are bound to this account's worker.
account_id = "6ce923037fd16a3e3a745ad4f2291601"
compatibility_date = "2026-04-15"

[assets]
directory = "./dist/client"
binding = "ASSETS"
html_handling = "drop-trailing-slash"
# Run Worker before static assets so middleware security headers apply to prerendered HTML.
run_worker_first = true
not_found_handling = "404-page"

# Custom domains are configured in Cloudflare Dashboard (Workers → jamestannahill-com → Domains).
# Do not add routes here — @astrojs/cloudflare nests them under [assets] incorrectly.
