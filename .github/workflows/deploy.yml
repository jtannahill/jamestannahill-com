# Deploy jamestannahill.com to Cloudflare Workers on every push to main.
#
# One-time setup (repo secrets):
#   gh secret set CLOUDFLARE_API_TOKEN --repo jtannahill/jamestannahill-com
#   gh secret set CLOUDFLARE_ACCOUNT_ID --repo jtannahill/jamestannahill-com
#
# Token: Cloudflare Dashboard → My Profile → API Tokens → Edit Cloudflare Workers
#   Permissions: Account → Workers Scripts → Edit, Account → Workers KV Storage → Edit
#   Account resources: include the account that hosts jamestannahill-com
#
# Account ID: wrangler whoami (use the account where the worker is deployed)

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'infra/**'
      - '.superpowers/**'
  workflow_dispatch:

concurrency:
  group: deploy-jamestannahill-com
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
