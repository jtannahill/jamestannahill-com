# Deploy is manual-only because the repo does not have Cloudflare secrets set.
# To enable push-to-deploy:
#   1. gh secret set CLOUDFLARE_API_TOKEN --repo jtannahill/jamestannahill-com
#   2. gh secret set CLOUDFLARE_ACCOUNT_ID --repo jtannahill/jamestannahill-com
#   3. Replace `on:` with `on: { push: { branches: [main] }, workflow_dispatch: {} }`
#
# Until then, run manually via: gh workflow run Deploy --repo jtannahill/jamestannahill-com
# Or deploy locally via: npm run build && npx wrangler deploy
name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
