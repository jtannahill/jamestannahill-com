# Deploy jamestannahill.com to Cloudflare Workers on every push to main.
#
# One-time setup (repo secrets):
#   gh secret set CLOUDFLARE_API_TOKEN --repo jtannahill/jamestannahill-com
#   gh secret set CLOUDFLARE_ACCOUNT_ID --repo jtannahill/jamestannahill-com
#
# Token: create while logged into privaterelay account (NOT Plocamium).
#   Dashboard → API Tokens → Edit Cloudflare Workers
#   Account resource: aa7a67b77a9549dc7cb54bb8aac477d8
#
# Account ID secret must be: aa7a67b77a9549dc7cb54bb8aac477d8
# Error 7003 = token scoped to wrong account.

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'infra/**'
      - '.superpowers/**'
  workflow_dispatch:

concurrency:
  group: deploy-jamestannahill-com
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify Cloudflare token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          resp=$(curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          echo "$resp" | jq -e '.success == true' >/dev/null
          echo "Cloudflare token verified."

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
